      description: "Microsoft Entra ID user with console access and group membership"
      data: |
        {
          "id": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
          "userPrincipalName": "mary.jones@example.com",
          "displayName": "Mary Jones",
