          "badPwdCount": 3,
          "logonCount": 89
        }

  fields:
    # OCSF EVENT CLASSIFICATION
    - source: "static: 2"
      target: "activity_id"
      type: "integer"
      logic: "Always 2 for 'Collect' activity"
      description: "OCSF activity ID for inventory collection"

    - source: "static: Collect"
      target: "activity_name"
      type: "string"
      logic: "Always 'Collect'"
      description: "OCSF activity name"

    - source: "static: Collect"
      target: "category_name"
      type: "string"
      logic: "Always 'Collect' (OCSF_CATEGORY_NAME constant)"
      description: "OCSF category name"

    - source: "static: 5"
      target: "category_uid"
      type: "integer"
      logic: "Always 5 for Discovery category"
      description: "OCSF category UID"

    - source: "static: User Inventory Info"
      target: "class_name"
      type: "string"
      logic: "Always 'User Inventory Info'"
      description: "OCSF class name"

    - source: "static: 5003"
      target: "class_uid"
      type: "integer"
      logic: "Always 5003 for User Inventory Info"
      description: "OCSF class UID"

    - source: "static: 500302"
      target: "type_uid"
      type: "integer"
      logic: "Always 500302 (OCSF_TYPE_UID constant)"
      description: "OCSF type UID"

    - source: "static: User Inventory"
      target: "type_name"
      type: "string"
      logic: "Always 'User Inventory' (OCSF_TYPE_NAME constant)"
      description: "OCSF type name"

    - source: "static: Informational"
      target: "severity"
      type: "string"
      logic: "Always 'Informational' for inventory events"
      description: "Event severity level"

    - source: "static: 1"
      target: "severity_id"
      type: "integer"
      logic: "Always 1 for Informational severity"
      description: "OCSF severity ID"

    # TIMESTAMP
    - source: "whenCreated"
      target: "time"
      type: "integer"
      logic: "Convert LDAP generalized time (YYYYMMDDhhmmss.0Z) to Unix timestamp for OCSF event timestamp"
      description: "OCSF event timestamp (user creation time)"

    # METADATA
    - source: "static: Microsoft Active Directory"
      target: "metadata.product.name"
      type: "string"
      logic: "Always 'Microsoft Active Directory'"
      description: "Source product name"

    - source: "static: Microsoft"
      target: "metadata.product.vendor_name"
      type: "string"
      logic: "Always 'Microsoft'"
      description: "Source product vendor name"

    - source: "static: N/A"
      target: "metadata.product.version"
      type: "string"
      logic: "Always 'N/A' (PRODUCT_VERSION constant)"
      description: "Product version"

    - source: "static: 1.6.0"
      target: "metadata.version"
      type: "string"
      logic: "Fixed OCSF schema version"
      description: "OCSF schema version"

    # USER IDENTIFICATION
    # NOTE: user.name is built from givenName + sn (first + last name).
    - source: "objectSid"
      target: "user.uid"
      type: "string"
      logic: "Direct mapping of user SID (Security Identifier)"
      description: "Active Directory user unique identifier (SID)"

    - source: "givenName + ' ' + sn"
      target: "user.name"
      type: "string"
      logic: "Concatenate givenName and sn; fallback to givenName only, sn only, or 'Unknown' if both absent"
      description: "User full name built from first and last name"

    - source: "displayName"
      target: "user.full_name"
      type: "string"
      logic: "Direct mapping of display name as full name"
      description: "User full name (from displayName attribute)"

    - source: "displayName"
      target: "user.display_name"
      type: "string"
      logic: "Direct mapping of display name"
      description: "User display name (User.display_name)"

    - source: "mail"
      target: "user.email_addr"
      type: "string"
      logic: "Direct mapping of email address"
      description: "User email address"

    - source: "distinguishedName"
      target: "user.domain"
      type: "string"
      logic: "Direct mapping of distinguished name as domain reference"
      description: "User domain (stored as full DN)"

    - source: "objectGUID"
      target: "user.uid_alt"
      type: "string"
      logic: "Direct mapping of GUID; strip surrounding curly braces if present"
      description: "Active Directory user GUID (alternative UID)"

    - source: "memberOf"
      target: "user.type"
      type: "string"
      logic: "Iterate memberOf DNs; if any contains 'admin' (case-insensitive) -> UserTypeStr.ADMIN ('Admin'), else -> UserTypeStr.USER ('User')"
      description: "User type (UserTypeStr): Admin if in an admin group, else User"

    - source: "memberOf"
      target: "user.type_id"
      type: "integer"
      logic: "Derive from type: Admin -> UserTypeId.ADMIN (2), User -> UserTypeId.USER (1)"
      description: "OCSF user type ID (UserTypeId)"

    # ACCOUNT
    # NOTE: account.uid maps objectSid (not distinguishedName); type/type_id use LDAP Account enum values.
    - source: "objectSid"
      target: "user.account.uid"
      type: "string"
      logic: "Direct mapping of objectSid as account UID"
      description: "Account UID (objectSid)"

    - source: "userPrincipalName"
      target: "user.account.name"
      type: "string"
      logic: "Direct mapping of user principal name"
      description: "User principal name (UPN) as account name"

    - source: "static: LDAP Account"
      target: "user.account.type"
      type: "string"
      logic: "Always 'LDAP Account' (AccountTypeStr.LDAP_ACCOUNT)"
      description: "Account type string"

    - source: "static: 1"
      target: "user.account.type_id"
      type: "integer"
      logic: "Always 1 for LDAP Account (AccountTypeId.LDAP_ACCOUNT)"
      description: "OCSF account type ID"

    # GROUPS
    # NOTE: The code sets only Group.name using the full DN string.
    - source: "memberOf"
      target: "user.groups"
      type: "array[object]"
      logic: "Create Group objects from memberOf list; each Group.name is set to the full DN string"
      description: "Group memberships (Group.name = full DN)"

    # OCSF ENRICHMENT - USER LOGIN INFORMATION
    # NOTE: UserEnrichmentObject fields: name (str), value (str), data (UserDataObject).
    # UserDataObject fields: is_enabled (bool), last_logon (str|None), bad_password_count (int), number_of_logons (int).
    - source: "static: login"
      target: "enrichments[0].name"
      type: "string"
      logic: "Always 'login' for user enrichment type"
      description: "Enrichment object name"

    - source: "static: infos"
      target: "enrichments[0].value"
      type: "string"
      logic: "Always 'infos' (UserEnrichmentObject.value constant)"
      description: "Enrichment object value"

    - source: "userAccountControl"
      target: "enrichments[0].data.is_enabled"
      type: "boolean"
      logic: "Compute account enabled status: enabled = not (userAccountControl & 2)"
      description: "Whether user account is enabled (UserDataObject.is_enabled)"

    - source: "lastLogon"
      target: "enrichments[0].data.last_logon"
      type: "string"
      logic: "Convert lastLogon datetime to string Unix timestamp; return null if year <= 1601 or invalid"
      description: "Last logon as string timestamp (UserDataObject.last_logon)"

    - source: "badPwdCount"
      target: "enrichments[0].data.bad_password_count"
      type: "integer"
      logic: "Direct mapping of bad password attempt count"
      description: "Number of failed password attempts (UserDataObject.bad_password_count)"

    - source: "logonCount"
      target: "enrichments[0].data.number_of_logons"
      type: "integer"
      logic: "Direct mapping of logon count"
      description: "Total number of logons (UserDataObject.number_of_logons)"

