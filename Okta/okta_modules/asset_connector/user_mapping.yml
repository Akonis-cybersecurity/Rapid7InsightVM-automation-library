  fields:
    # OCSF EVENT CLASSIFICATION
    - source: "static: 2"
      target: "activity_id"
      type: "integer"
      logic: "Always 2 for 'Collect' activity"
      description: "OCSF activity ID for inventory collection"

    - source: "static: Collect"
      target: "activity_name"
      type: "string"
      logic: "Always 'Collect'"
      description: "OCSF activity name"

    - source: "static: Discovery"
      target: "category_name"
      type: "string"
      logic: "Always 'Discovery'"
      description: "OCSF category name"

    - source: "static: 5"
      target: "category_uid"
      type: "integer"
      logic: "Always 5 for Discovery category"
      description: "OCSF category UID"

    - source: "static: User Inventory Info"
      target: "class_name"
      type: "string"
      logic: "Always 'User Inventory Info'"
      description: "OCSF class name"

    - source: "static: 5003"
      target: "class_uid"
      type: "integer"
      logic: "Always 5003 for User Inventory Info"
      description: "OCSF class UID"

    - source: "static: 500302"
      target: "type_uid"
      type: "integer"
      logic: "Always 500302 for User Inventory Info: Collect type"
      description: "OCSF type UID"

    - source: "static: User Inventory Info: Collect"
      target: "type_name"
      type: "string"
      logic: "Always 'User Inventory Info: Collect'"
      description: "OCSF type name"

    - source: "static: Informational"
      target: "severity"
      type: "string"
      logic: "Always 'Informational' for inventory events"
      description: "Event severity level"

    - source: "static: 1"
      target: "severity_id"
      type: "integer"
      logic: "Always 1 for Informational severity"
      description: "OCSF severity ID"

    # TIMESTAMPS INFORMATION
    - source: "created"
      target: "time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch for OCSF event timestamp"
      description: "OCSF event timestamp (user discovery time)"

    # METADATA
    - source: "static: Okta"
      target: "metadata.product.name"
      type: "string"
      logic: "Always 'Okta'"
      description: "Source product name"

    - source: "static: Okta"
      target: "metadata.product.vendor_name"
      type: "string"
      logic: "Always 'Okta'"
      description: "Source product vendor name"

    - source: "static: N/A"
      target: "metadata.product.version"
      type: "string"
      logic: "Always 'N/A' since Okta is a SaaS product without traditional versioning"
      description: "Source product version"

    - source: "static: 1.6.0"
      target: "metadata.version"
      type: "string"
      logic: "Fixed OCSF schema version"
      description: "OCSF schema version"

    # USER IDENTIFICATION
    - source: "id"
      target: "user.uid"
      type: "string"
      logic: "Direct mapping of Okta user ID"
      description: "Okta user unique identifier"

    - source: "calculated: profile.firstName and profile.lastName"
      target: "user.full_name"
      type: "string"
      logic: "Concatenate first and last names"
      description: "User full name"

    - source: "profile.email"
      target: "user.email_addr"
      type: "string"
      logic: "Direct mapping of email address"
      description: "User email address"

    - source: "profile.login"
      target: "user.name"
      type: "string"
      logic: "Direct mapping of user login"
      description: "User login/username (typically email)"

    - source: "profile.login"
      target: "user.account.uid"
      type: "string"
      logic: "Direct mapping of user login as account identifier"
      description: "Okta account identifier (login/email)"

    - source: "profile.login"
      target: "user.account.name"
      type: "string"
      logic: "Direct mapping of user login"
      description: "Account username (login)"

    - source: "static: OTHER"
      target: "user.account.type"
      type: "string"
      logic: "Always 'OTHER' for Okta account type"
      description: "Account type identifier"

    - source: "static: 42"
      target: "user.account.type_id"
      type: "integer"
      logic: "Always 42 for Okta account type"
      description: "OCSF account type ID"

    - source: "id"
      target: "user.account.uid"
      type: "string"
      logic: "Direct mapping of Okta user ID as account UID for correlation"
      description: "Idential Okta user ID for account correlation"

    - source: "group.id"
      target: "user.groups[].uid"
      type: "string"
      logic: "Direct mapping of Okta group ID to group UID in user groups array"
      description: "Group unique identifier"

    - source: "group.profile.name"
      target: "user.groups[].name"
      type: "string"
      logic: "Direct mapping of Okta group name to group name in user groups array"
      description: "Group name"

    - source: "group.profile.description"
      target: "user.groups[].desc"
      type: "string"
      logic: "Direct mapping of Okta group description to group description in user groups array"
      description: "Group description"

    - source: "id"
      target: "user.has_mfa"
      type: "boolean"
      logic: "True if user has any MFA factors enrolled, false otherwise (requires additional API call to check factors)"
      description: "MFA enrollment status"

    - source: "profile.displayName"
      target: "user.display_name"
      type: "string"
      logic: "Direct mapping of display name"
      description: "User display name"

    - source: "calculated: profile.displayName"
      target: "user.domain"
      type: "string"
      logic: "Extract domain from email address if displayName is an email, otherwise set to null"
      description: "User domain"

    - source: "profile.login"
      target: "user.uid_alt"
      type: "string"
      logic: "Direct mapping of user login as alternate UID for correlation"
      description: "Alternate user identifier (login/email) for correlation"

    - source: "calculated: roles assigned to user"
      target: "user.type_id"
      type: "integer"
      logic: "If user has admin roles, set to 'Admin'; otherwise set to 'None'"
      description: "User type ID "

    - source: "calculated: roles assigned to user"
      target: "user.type"
      type: "string"
      logic: "If user has admin roles, set to 'Admin'; otherwise set to 'None'"
      description: "User type"

