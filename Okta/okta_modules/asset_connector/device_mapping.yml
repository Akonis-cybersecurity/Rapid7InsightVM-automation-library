  fields:
    # OCSF EVENT CLASSIFICATION
    - source: "static: 2"
      target: "activity_id"
      type: "integer"
      logic: "Always 2 for 'Collect' activity"
      description: "OCSF activity ID for inventory collection"

    - source: "static: Collect"
      target: "activity_name"
      type: "string"
      logic: "Always 'Collect'"
      description: "OCSF activity name"

    - source: "static: Discovery"
      target: "category_name"
      type: "string"
      logic: "Always 'Discovery'"
      description: "OCSF category name"

    - source: "static: 5"
      target: "category_uid"
      type: "integer"
      logic: "Always 5 for Discovery category"
      description: "OCSF category UID"

    - source: "static: Device Inventory Info"
      target: "class_name"
      type: "string"
      logic: "Always 'Device Inventory Info'"
      description: "OCSF class name"

    - source: "static: 5001"
      target: "class_uid"
      type: "integer"
      logic: "Always 5001 for Device Inventory Info"
      description: "OCSF class UID"

    - source: "static: 500102"
      target: "type_uid"
      type: "integer"
      logic: "Always 500102 for Device Inventory Info: Collect type"
      description: "OCSF type UID"

    - source: "static: Device Inventory Info: Collect"
      target: "type_name"
      type: "string"
      logic: "Always 'Device Inventory Info: Collect'"
      description: "OCSF type name"

    - source: "static: Informational"
      target: "severity"
      type: "string"
      logic: "Always 'Informational' for inventory events"
      description: "Event severity level"

    - source: "static: 1"
      target: "severity_id"
      type: "integer"
      logic: "Always 1 for Informational severity"
      description: "OCSF severity ID"

    # TIMESTAMP INFORMATION
    - source: "created"
      target: "time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch for OCSF event timestamp"
      description: "OCSF event timestamp (device discovery time)"

    # METADATA
    - source: "static: Okta"
      target: "metadata.product.name"
      type: "string"
      logic: "Always 'Okta'"
      description: "Source product name"

    - source: "static: Okta"
      target: "metadata.product.vendor_name"
      type: "string"
      logic: "Always 'Okta'"
      description: "Source product vendor name"

    - source: "static: N/A"
      target: "metadata.product.version"
      type: "string"
      logic: "Always 'N/A' since Okta device info is not tied to a specific product version"
      description: "Source product version"

    - source: "static: 1.6.0"
      target: "metadata.version"
      type: "string"
      logic: "Fixed OCSF schema version"
      description: "OCSF schema version"

    # DEVICE IDENTIFICATION
    - source: "profile.displayName"
      target: "device.hostname"
      type: "string"
      logic: "Direct mapping of display name as hostname"
      description: "Device hostname (from display name)"

    - source: "id"
      target: "device.uid"
      type: "string"
      logic: "Direct mapping of Okta device ID"
      description: "Okta device unique identifier"

    - source: "profile.displayName"
      target: "device.name"
      type: "string"
      logic: "Direct mapping of display name"
      description: "Device display name"

    - source: "calculated: profile.platform"
      target: "device.type"
      type: "string"
      logic: "Calculate device type ID based on platform"
      description: "Device type"

    - source: "calculated: profile.platform"
      target: "device.type_id"
      type: "integer"
      logic: "Calculate device type ID based on platform"
      description: "Device type ID"

    - source: "profile.platform"
      target: "device.os.name"
      type: "string"
      logic: "Direct mapping of platform (Windows, iOS, Android, MacOS)"
      description: "Operating system platform"

    - source: "profile.platform"
      target: "device.os.type"
      type: "string"
      logic: "Map platform to OS type"
      description: "Operating system type"

    - source: "profile.platform"
      target: "device.os.type_id"
      type: "string"
      logic: "Map platform to OS type ID"
      description: "Operating system type ID"

    - source: "profile.osVersion"
      target: "device.os.version"
      type: "string"
      logic: "Direct mapping of OS version"
      description: "Operating system version"

    - source: "profile.manufacturer"
      target: "device.vendor_name"
      type: "string"
      logic: "Direct mapping of device vendor name"
      description: "Device vendor name"

    - source: "profile.model"
      target: "device.model"
      type: "string"
      logic: "Direct mapping of device model"
      description: "Device model"

    - source: "created"
      target: "device.created_time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch"
      description: "Device creation timestamp (Unix epoch)"

    - source: "lastSeen"
      target: "device.last_seen_time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch; null if never seen"
      description: "Last seen timestamp (Unix epoch)"

    - source: "calculated: profile.registered"
      target: "device.is_managed"
      type: "boolean"
      logic: "Direct mapping of managed status"
      description: "Whether device is managed by Okta"

    - source: "calculated: status"
      target: "device.is_compliant"
      type: "boolean"
      logic: "Calculate compliance boolean based on status (true if ACTIVE and COMPLIANT, false otherwise)"
      description: "Whether device is compliant"

    # OCSF ENRICHMENTS FIELDS
    - source: "static: device_info"
      target: "enrichments.name"
      type: "string"
      logic: "Always 'device_info' to indicate enrichment type for Okta device details"
      description: "Name of the enrichment containing Okta device details"

    - source: "static: hardware_and_security"
      target: "enrichments.value"
      type: "string"
      logic: "Always 'hardware_and_security' to indicate enrichment category for device hardware and security posture"
      description: "Value of the enrichment indicating hardware and security posture details"

    - source: "calculated: diskEncryptionType, serialNumber, secureHardwarePresent and Sid"
      target: "enrichments.data"
      type: "string"
      logic: "Calculate enrichment data with key Okta device details such as encryption type, serial number, secure hardware presence, and compliance status to provide additional context on device security posture"
      description: "Data field of the enrichment containing key Okta device details for additional context on device security posture"

  ocsf_samples:
