  fields:
    # OCSF EVENT CLASSIFICATION
    - source: "static: 2"
      target: "activity_id"
      type: "integer"
      logic: "Always 2 for 'Collect' activity"
      description: "OCSF activity ID for inventory collection"

    - source: "static: Collect"
      target: "activity_name"
      type: "string"
      logic: "Always 'Collect'"
      description: "OCSF activity name"

    - source: "static: Discovery"
      target: "category_name"
      type: "string"
      logic: "Always 'Discovery'"
      description: "OCSF category name"

    - source: "static: 5"
      target: "category_uid"
      type: "integer"
      logic: "Always 5 for Discovery category"
      description: "OCSF category UID"

    - source: "static: Device Inventory Info"
      target: "class_name"
      type: "string"
      logic: "Always 'Device Inventory Info'"
      description: "OCSF class name"

    - source: "static: 5001"
      target: "class_uid"
      type: "integer"
      logic: "Always 5001 for Device Inventory Info"
      description: "OCSF class UID"

    - source: "static: 500102"
      target: "type_uid"
      type: "integer"
      logic: "Always 500102 for Device Inventory Info: Collect"
      description: "OCSF type UID"

    - source: "static: Device Inventory Info: Collect"
      target: "type_name"
      type: "string"
      logic: "Always 'Device Inventory Info: Collect'"
      description: "OCSF type name"

    - source: "static: Informational"
      target: "severity"
      type: "string"
      logic: "Always 'Informational' for inventory events"
      description: "Event severity level"

    - source: "static: 1"
      target: "severity_id"
      type: "integer"
      logic: "Always 1 for Informational severity"
      description: "OCSF severity ID"

    # TIMESTAMP
    - source: "createdAt"
      target: "time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch for OCSF event timestamp"
      description: "OCSF event timestamp (device creation time)"

    # METADATA
    - source: "static: SentinelOne"
      target: "metadata.product.name"
      type: "string"
      logic: "Always 'SentinelOne'"
      description: "Source product name"

    - source: "static: SentinelOne"
      target: "metadata.product.vendor_name"
      type: "string"
      logic: "Always 'SentinelOne'"
      description: "Source product vendor name"

    - source: "agentVersion"
      target: "metadata.product.version"
      type: "string"
      logic: "Direct mapping of agent version; fallback to 'N/A' if absent"
      description: "SentinelOne agent version stored in metadata.product.version"

    - source: "static: 1.6.0"
      target: "metadata.version"
      type: "string"
      logic: "Fixed OCSF schema version"
      description: "OCSF schema version"

    # DEVICE IDENTIFICATION
    # NOTE: uuid is the primary UID when available; id is used as uid_alt in that case.
    - source: "uuid || id"
      target: "device.uid"
      type: "string"
      logic: "Use uuid as primary UID if present, otherwise fall back to id"
      description: "Device unique identifier (UUID preferred, id as fallback)"

    - source: "id"
      target: "device.uid_alt"
      type: "string"
      logic: "Set to id only when uuid is used as primary uid; null otherwise"
      description: "Alternate device identifier (SentinelOne agent id)"

    - source: "computerName"
      target: "device.hostname"
      type: "string"
      logic: "Direct mapping of computer name"
      description: "Device hostname"

    - source: "domain"
      target: "device.domain"
      type: "string"
      logic: "Direct mapping of domain"
      description: "Network domain name"

    # DEVICE TYPE
    # NOTE: type/type_id are derived from machineType using get_device_type() mapping.
    - source: "machineType"
      target: "device.type"
      type: "string"
      logic: "Map machineType to DeviceTypeStr: 'desktop'->Desktop, 'laptop'->Laptop, 'server'->Server, 'tablet'->Tablet, 'mobile'->Mobile, 'virtual'->Virtual, else->Other"
      description: "Device type (DeviceTypeStr)"

    - source: "machineType"
      target: "device.type_id"
      type: "integer"
      logic: "Map machineType to DeviceTypeId: Desktop=2, Laptop=3, Server=1, Tablet=4, Mobile=5, Virtual=6, Other=99"
      description: "OCSF device type ID (DeviceTypeId)"

    # OPERATING SYSTEM
    # NOTE: OperatingSystem model has only name, type, type_id — no version or build fields.
    # os.name is a combined string built from osName + osRevision.
    - source: "osName + ' ' + osRevision"
      target: "device.os.name"
      type: "string"
      logic: "Combine osName and osRevision into display string; fallback chain: osName only, osRevision only, osType, 'Unknown'"
      description: "Operating system display name (combined from osName and osRevision)"

    - source: "osType"
      target: "device.os.type"
      type: "string"
      logic: "Map osType to OSTypeStr: 'windows'->windows, 'macos'->macos, 'linux'->linux, 'ios'->ios, 'android'->android, else->other"
      description: "Operating system type (OSTypeStr)"

    - source: "osType"
      target: "device.os.type_id"
      type: "integer"
      logic: "Map osType to OSTypeId: Windows=100, macOS=300, Linux=200, iOS=301, Android=201, Other=99"
      description: "OCSF operating system type ID (OSTypeId)"

    # NETWORK
    - source: "externalIp"
      target: "device.ip"
      type: "string"
      logic: "Direct mapping of external IP address"
      description: "Primary device IP (external IP from SentinelOne)"

    - source: "groupIp"
      target: "device.subnet"
      type: "string"
      logic: "Direct mapping of group IP range as subnet reference (e.g., '31.155.5.x')"
      description: "Network subnet/range (Device.subnet)"

    - source: "networkInterfaces"
      target: "device.network_interfaces"
      type: "array[object]"
      logic: "Map each NetworkInterface: name=name, mac=physical, ip=inet[0] if inet exists, uid=id"
      description: "Network interfaces (NetworkInterface objects)"

    # DEVICE HARDWARE
    - source: "modelName"
      target: "device.model"
      type: "string"
      logic: "Direct mapping of device model name"
      description: "Device model name"

    - source: "modelName"
      target: "device.vendor_name"
      type: "string"
      logic: "Direct mapping of modelName as vendor_name (Device.vendor_name)"
      description: "Device vendor name (mapped from modelName)"

    # DEVICE TIMESTAMPS
    - source: "createdAt"
      target: "device.created_time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch"
      description: "Device creation timestamp (Unix epoch)"

    - source: "registeredAt"
      target: "device.first_seen_time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch; null if absent"
      description: "Device first seen timestamp from registeredAt (Unix epoch)"

    - source: "lastActiveDate"
      target: "device.last_seen_time"
      type: "integer"
      logic: "Convert ISO 8601 to Unix epoch; null if never active"
      description: "Device last active timestamp (Unix epoch)"

    - source: "osStartTime"
      target: "device.boot_time"
      type: "timestamp"
      logic: "Convert ISO 8601 to Unix epoch; null if absent"
      description: "Device boot time from osStartTime (Unix epoch)"

    # DEVICE STATUS & COMPLIANCE
    - source: "static: True"
      target: "device.is_managed"
      type: "boolean"
      logic: "Always true — SentinelOne agents are managed by definition"
      description: "Whether device is under active management"

    - source: "isUpToDate"
      target: "device.is_compliant"
      type: "boolean"
      logic: "Direct mapping of isUpToDate as compliance status; null if absent"
      description: "Whether device agent is up to date (compliance proxy)"

    - source: "siteName"
      target: "device.region"
      type: "string"
      logic: "Direct mapping of site name as region"
      description: "Device region (mapped from siteName)"

    # GROUPS & LOCATION
    - source: "groupName"
      target: "device.groups[].name"
      type: "string"
      logic: "Create a single Group with name=groupName; omit if both groupName and groupId are absent"
      description: "Device group name (Group.name)"

    - source: "groupId || groupName"
      target: "device.groups[].uid"
      type: "string"
      logic: "Use groupId as uid; fallback to groupName if groupId absent"
      description: "Device group UID (Group.uid)"

    - source: "locations[0].name"
      target: "device.location.city"
      type: "string"
      logic: "Use first location name as GeoLocation.city; null if locations list is absent or empty"
      description: "Device location city (GeoLocation.city from locations[0].name)"

    # OCSF ENRICHMENT
    # NOTE: The code creates up to 5 separate DeviceEnrichmentObject entries depending on data availability.
    # DeviceDataObject model fields: Firewall_status (Literal["Disabled","Enabled"]), Users (list[str]).
    - source: "static: Firewall"
      target: "enrichments[0].name"
      type: "string"
      logic: "Always 'Firewall' for firewall enrichment; only created if firewallEnabled is not null"
      description: "Firewall enrichment name"

    - source: "firewallEnabled"
      target: "enrichments[0].value"
      type: "string"
      logic: "'Enabled' if firewallEnabled is true, 'Disabled' if false"
      description: "Firewall status string value"

    - source: "firewallEnabled"
      target: "enrichments[0].data.Firewall_status"
      type: "string"
      logic: "'Enabled' if firewallEnabled is true, 'Disabled' if false (DeviceDataObject.Firewall_status)"
      description: "Firewall status in enrichment data (DeviceDataObject.Firewall_status)"

    - source: "static: Users"
      target: "enrichments[1].name"
      type: "string"
      logic: "Always 'Users'; only created if lastLoggedInUserName or osUsername is present"
      description: "Users enrichment name"

    - source: "lastLoggedInUserName + osUsername"
      target: "enrichments[1].value"
      type: "string"
      logic: "Comma-joined list of lastLoggedInUserName and osUsername (deduplicated)"
      description: "Users enrichment value (comma-joined user list)"

    - source: "lastLoggedInUserName + osUsername"
      target: "enrichments[1].data.Users"
      type: "array[string]"
      logic: "Deduplicated list of [lastLoggedInUserName, osUsername] (DeviceDataObject.Users)"
      description: "User list in enrichment data (DeviceDataObject.Users)"

    - source: "static: Update Status"
      target: "enrichments[2].name"
      type: "string"
      logic: "Always 'Update Status'; only created if isUpToDate is not null"
      description: "Update status enrichment name"

    - source: "isUpToDate"
      target: "enrichments[2].value"
      type: "string"
      logic: "'Up to Date' if isUpToDate is true, 'Update Required' if false"
      description: "Update status value"

    - source: "static: Active Threats"
      target: "enrichments[3].name"
      type: "string"
      logic: "Always 'Active Threats'; only created if activeThreats is not null"
      description: "Active threats enrichment name"

    - source: "activeThreats"
      target: "enrichments[3].value"
      type: "string"
      logic: "String representation of activeThreats count"
      description: "Active threats count as string value"

    - source: "static: Infection Status"
      target: "enrichments[4].name"
      type: "string"
      logic: "Always 'Infection Status'; only created if infected is not null"
      description: "Infection status enrichment name"

    - source: "infected"
      target: "enrichments[4].value"
      type: "string"
      logic: "'Infected' if infected is true, 'Clean' if false"
      description: "Infection status value"

